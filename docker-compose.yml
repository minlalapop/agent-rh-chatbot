services:
  hr-agent:
    build: .
    container_name: hr-agent
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-agent-rh-interne}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-http://localhost:8000}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash-lite}
      TOP_K: ${TOP_K:-5}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-25}
      LLM_MODE: ${LLM_MODE:-llm_only}
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
      - ./data:/app/data:ro
      - ./report:/app/report
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
